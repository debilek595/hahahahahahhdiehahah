<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 20%;
    }

    #jumpscare {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
    }

    #jumpscare img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #startBtn {
      padding: 15px 30px;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>System loading...</h1>
  <p>Click to continue</p>

  <button id="startBtn">START</button>

  <div id="jumpscare">
    <img src="https://i.imgur.com/8QZQZQx.jpg" alt="scary">
    <audio id="sound" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>
  </div>

  <script>
    const btn = document.getElementById("startBtn");
    const jumpscare = document.getElementById("jumpscare");
    const sound = document.getElementById("sound");

    btn.onclick = function() {
      btn.style.display = "none";

      setTimeout(() => {
        jumpscare.style.display = "block";
        sound.play();
      }, 3000);
    };
  </script>

</body>
</html>
